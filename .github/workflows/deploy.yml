name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build --workspace=client

      - name: Write server .env from GitHub Secrets
        run: |
          printf 'NODE_ENV=production\n' > server/.env
          printf 'PORT=3001\n' >> server/.env
          printf 'REDIS_URL=%s\n' '${{ secrets.REDIS_URL }}' >> server/.env
          printf 'S3_BUCKET=%s\n' '${{ secrets.S3_BUCKET }}' >> server/.env
          printf 'S3_REGION=%s\n' '${{ secrets.AWS_REGION }}' >> server/.env
          printf 'CORS_ORIGIN=%s\n' '${{ secrets.CORS_ORIGIN }}' >> server/.env
          printf 'MAX_FILE_SIZE=104857600\n' >> server/.env
          printf 'UPLOAD_RATE_LIMIT=10\n' >> server/.env
          printf 'SESSION_GRACE_PERIOD=30\n' >> server/.env
          printf 'PRESIGNED_URL_EXPIRY=3600\n' >> server/.env
          printf 'DOWNLOAD_URL_EXPIRY=300\n' >> server/.env

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package and upload to S3
        run: |
          zip -r deploy.zip server/ client/dist/ --exclude "server/node_modules/*" --exclude "server/.env" --exclude "*.git*"
          aws s3 cp deploy.zip s3://${{ secrets.DEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip /tmp/deploy.zip",
              "mkdir -p /home/ec2-user/vanishdrop",
              "unzip -o /tmp/deploy.zip -d /home/ec2-user/vanishdrop",
              "chown -R ec2-user:ec2-user /home/ec2-user/vanishdrop",
              "cd /home/ec2-user/vanishdrop/server && npm install --omit=dev",
              "su - ec2-user -c \"cd /home/ec2-user/vanishdrop/server && pm2 startOrRestart ecosystem.config.cjs --update-env\"",
              "su - ec2-user -c \"pm2 save\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          # Check result
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Status" --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
