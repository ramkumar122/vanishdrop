name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify app
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_TEST_URL: ${{ secrets.REDIS_URL }}
          S3_TEST_BUCKET: ${{ secrets.S3_TEST_BUCKET }}
          S3_TEST_REGION: ${{ secrets.AWS_REGION }}
        run: npm run verify:full

      - name: Package and upload to S3
        run: |
          zip -r deploy.zip server/ client/dist/ --exclude "server/node_modules/*" --exclude "server/.env" --exclude "*.git*"
          aws s3 cp deploy.zip s3://${{ secrets.DEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip

      - name: Deploy to EC2 via SSM
        run: |
          ENV_B64=$(printf 'NODE_ENV=production\nPORT=3001\nREDIS_URL=%s\nS3_BUCKET=%s\nS3_REGION=%s\nCORS_ORIGIN=%s\nMAX_FILE_SIZE=10737418240\nUPLOAD_RATE_LIMIT=10\nSESSION_GRACE_PERIOD=5\nPRESIGNED_URL_EXPIRY=3600\nDOWNLOAD_URL_EXPIRY=300\n' \
            '${{ secrets.REDIS_URL }}' \
            '${{ secrets.S3_BUCKET }}' \
            '${{ secrets.AWS_REGION }}' \
            '${{ secrets.CORS_ORIGIN }}' | base64 | tr -d '\n')

          PARAMS_FILE=$(mktemp)
          cat > "$PARAMS_FILE" <<EOF
          {
            "commands": [
              "aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/deploy-${{ github.sha }}.zip /tmp/deploy.zip",
              "mkdir -p /home/ec2-user/vanishdrop",
              "unzip -o /tmp/deploy.zip -d /home/ec2-user/vanishdrop",
              "chown -R ec2-user:ec2-user /home/ec2-user/vanishdrop",
              "printf '%s' '$ENV_B64' | base64 -d > /home/ec2-user/vanishdrop/server/.env",
              "chown ec2-user:ec2-user /home/ec2-user/vanishdrop/server/.env",
              "chmod 600 /home/ec2-user/vanishdrop/server/.env",
              "cd /home/ec2-user/vanishdrop/server && npm install --omit=dev",
              "su - ec2-user -c \"cd /home/ec2-user/vanishdrop/server && pm2 startOrRestart ecosystem.config.cjs --update-env\"",
              "su - ec2-user -c \"pm2 save\""
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters file://"$PARAMS_FILE" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          # Check result
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Status" --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
